# CiliumNetworkPolicy for nginx-example namespace
# Covers only Layer 3/4: ingress/egress allow + DNS.
# For Layer 7 policy (HTTP paths, methods, headers),
# use an L7 CiliumNetworkPolicy with FQDN rules or
# place an Envoy sidecar and apply an L7 CiliumEnvoyConfig.
#
# Key idea:
# - ingress: allow only Cilium Gateway ingress entity on TCP/80
# - egress: allow internet (world) + DNS (kube-dns in kube-system)
#
# Why ingress entity:
# - cilium-envoy pod runs in host-network / node-level mode
#   and may not appear as a normal Cilium endpoint,
#   so namespace selectors like `kube-system` do not match.
# - `ingress` entity covers Gateway proxy traffic without
#   opening the app to all cluster pods.
#
# Note:
# - If you later add sidecar/envoy per-pod and want L7 rules,
#   extend this policy with `toPorts.http` rules or an
#   `CiliumEnvoyConfig` referencing this namespace.

apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: nginx-isolation
  namespace: nginx-example
spec:
  description: "Allow nginx traffic only from ingress entity and DNS egress"
  endpointSelector:
    matchLabels:
      app: nginx
  ingress:
    # Allow traffic only from Cilium Gateway ingress proxy.
    # Blocks direct pod-to-pod access from other namespaces.
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    # Allow outbound internet access (HTTP/HTTPS, apt, etc.)
    - toEntities:
        - world
    # Allow DNS resolution to kube-dns in kube-system.
    # Required for service discovery and external hostnames.
    - toEndpoints:
        - matchLabels:
            k8s:k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
